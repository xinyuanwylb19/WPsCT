<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Wood Products Carbon Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script>document.write('<link rel="stylesheet" href="css/styles.css?v=' + Date.now() + '">');</script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js" defer></script>
  </head>
  <body class="bg-gray-50 text-gray-900">


    <header class="title-bg">
      <div class="title-overlay">
        <div class="mx-auto px-4 py-6 max-w-[1760px]">
          <div class="flex items-center gap-4">
            <img src="./assets/img/Logo_WPsCT_v2.png?v=2" alt="WPsCT Logo" class="h-16 w-auto md:h-20 object-contain">
            <h1 class="text-3xl md:text-4xl font-bold">Wood Products Carbon Tracker</h1>
          </div>
        </div>
      </div>
    </header>

    <div class="mx-auto px-4 pt-5 max-w-[1760px]">
      <!-- Main tab navigation -->
      <div class="flex flex-wrap gap-1 border-b-2 border-slate-200">
        <button class="tab-btn active" onclick="switchTab('il',    this)">🪵 Industrial Logs</button>
        <button class="tab-btn"        onclick="switchTab('sp',    this)">📐 Primary Products</button>
        <button class="tab-btn"        onclick="switchTab('eup',   this)">🏠 End-use Products</button>
        <button class="tab-btn"        onclick="switchTab('gwp',   this)">🌍 Global WPs Carbon</button>
        <button class="tab-btn"        onclick="switchTab('sens',  this)">📊 Sensitivity Analysis</button>
        <button class="tab-btn"        onclick="switchTab('guide',  this)">📖 User Guide</button>
        <button class="tab-btn"        onclick="switchTab('about',  this)">🌳 Research &amp; Team</button>
      </div>
    </div>


    <main class="mx-auto px-4 py-5 max-w-[1760px]">
      <!-- Each tab lives in its own file under tabs/. They are loaded once and
           assembled here; Python (Pyodide) then loads a single time. -->
      <div id="tab-root"></div>
    </main>

    <script>
      // Minimal tab switch, available immediately for the nav buttons.
      window.switchTab = function(name, btn){
        document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
        var panel = document.getElementById('tab-' + name);
        if (panel) panel.classList.add('active');
        if (btn)   btn.classList.add('active');
      };
      // Load every tab from its own file, assemble into #tab-root, then start app.js.
      (async function(){
        const V = Date.now();   // cache-buster: always load fresh tab files & app.js
        const TAB_FILES = ['industrial-logs','primary-products','end-use','global','sensitivity','user-guide','research-team'];
        const parts = await Promise.all(TAB_FILES.map(async function(f){
          try { const r = await fetch('tabs/' + f + '.html?v=' + V); return await r.text(); }
          catch(e){ return '<div class="tab-panel"><p class="text-red-600 p-4">Failed to load ' + f + '</p></div>'; }
        }));
        document.getElementById('tab-root').innerHTML = parts.join('\n');
        const s = document.createElement('script'); s.src = 'js/app.js?v=' + V; document.body.appendChild(s);
      })();
    </script>
    <footer class="mx-auto px-4 py-6 max-w-[1760px] text-right text-sm text-gray-500 border-t border-slate-200 mt-8">
      © Wood Products Carbon Tracker (WPsCT). Released on 6/20/2026. Updated on 7/3/2026.
    </footer>
  </body>
</html>
